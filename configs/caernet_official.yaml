method: caernet_official
seed: 42

dataset:
  dataset_root: /home/taqiyudinmiftah/risetv2/caer_dataset/CAER-S
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".webp"]
  create_val_split: true
  val_ratio: 0.1
  image_size: 224

model:
  dropout: 0.5

train:
  batch_size: 128
  num_epochs: 50
  lr: 0.01
  weight_decay: 0.0
  num_workers: 4
  device: ""
  stream_mode: multimodal
  save_dir: checkpoints
  optimizer: sgd
  momentum: 0.9
  nesterov: true
  scheduler: step
  step_milestones: [20, 40]
  step_gamma: 0.1
  grad_clip_norm: 0.0
  early_stopping_patience: 20

outputs:
  manifest_path: artifacts/caers/manifest_caers_mtcnn.jsonl
  diagnostics_path: artifacts/caers/diagnostics.json
