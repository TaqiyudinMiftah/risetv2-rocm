method: caernet
seed: 42

dataset:
  dataset_root: /home/taqiyudinmiftah/risetv2/caer_dataset/CAER-S
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".webp"]
  create_val_split: true
  val_ratio: 0.1
  image_size: 224             # paper: both face & context are 224x224

model:
  backbone: resnet18
  pretrained: true
  dropout: 0.5

train:
  batch_size: 32
  num_epochs: 60              # more epochs for fine-tuning
  lr: 0.001                   # fine-tuning lr
  weight_decay: 0.0001
  num_workers: 4
  device: ""
  stream_mode: multimodal
  save_dir: checkpoints
  optimizer: sgd
  momentum: 0.9
  nesterov: true
  scheduler: step
  step_milestones: [20, 40]   # drop lr at 20 and 40 for 60-epoch schedule
  step_gamma: 0.1
  grad_clip_norm: 5.0

outputs:
  manifest_path: artifacts/caers/manifest_caers.jsonl
  diagnostics_path: artifacts/caers/diagnostics.json
