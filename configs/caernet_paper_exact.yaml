method: caernet
seed: 42

dataset:
  dataset_root: /home/taqiyudinmiftah/risetv2/caer_dataset/CAER-S
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".webp"]
  create_val_split: true
  val_ratio: 0.1
  image_size: 224             # paper: both face & context are 224x224

model:
  backbone: custom
  pretrained: false
  dropout: 0.5

train:
  batch_size: 128              # paper: mini-batches of 128
  num_epochs: 100              # paper: 100 epochs
  lr: 0.001                    # paper: 1e-3
  weight_decay: 0.0005         # standard ImageNet setting
  num_workers: 4
  device: ""
  stream_mode: multimodal
  save_dir: checkpoints
  optimizer: sgd
  momentum: 0.9
  nesterov: true
  scheduler: step
  step_milestones: [40, 80]    # paper: divide by 10 at 40th and 80th epochs
  step_gamma: 0.1
  grad_clip_norm: 5.0

outputs:
  manifest_path: artifacts/caers/manifest_caers.jsonl
  diagnostics_path: artifacts/caers/diagnostics.json
